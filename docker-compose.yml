services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine}
    restart: unless-stopped
    network_mode: host
    environment:
      CADDY_HTTP_PORT: ${CADDY_HTTP_PORT:-8000}
      LEMONADE_UPSTREAM: ${LEMONADE_UPSTREAM:-127.0.0.1:13305}
      LITELLM_UPSTREAM: ${LITELLM_UPSTREAM:-127.0.0.1:4000}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - litellm

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai-rocm:latest}
    restart: unless-stopped
    network_mode: host
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      FLASH_ATTENTION_TRITON_AMD_ENABLE: ${FLASH_ATTENTION_TRITON_AMD_ENABLE:-TRUE}
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: ${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
    ipc: host
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3.6-35B-A3B}
      - --port
      - ${VLLM_PORT:-30000}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-131072}
      - --kv-cache-dtype
      - ${VLLM_KV_CACHE_DTYPE:-fp8}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.95}
      - --enable-prefix-caching
      - --reasoning-parser
      - ${VLLM_REASONING_PARSER:-qwen3}
      - --language-model-only
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-256}
      - --enforce-eager

  litellm:
    image: ${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-stable}
    restart: unless-stopped
    network_mode: host
    command: ["--config", "/etc/litellm/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-change-me}
      LEMONADE_API_BASE: ${LEMONADE_API_BASE:-http://127.0.0.1:13305/v1}
      LEMONADE_API_KEY: ${LEMONADE_API_KEY:-none}
      PHI4_NPU_API_BASE: ${PHI4_NPU_API_BASE:-http://127.0.0.1:52625/v1}
      PHI4_NPU_API_KEY: ${PHI4_NPU_API_KEY:-none}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://127.0.0.1:11434/v1}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
    volumes:
      - ./litellm:/etc/litellm:ro
    depends_on:
      - vllm

volumes:
  caddy-data:
  caddy-config:
